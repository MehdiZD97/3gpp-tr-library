los_probability:
- scenario: RMa
  formula: Pr_{LOS} = \begin{cases} 1 & d_{2D-out} \le 10m \\ \exp\left(-\dfrac{d_{2D-out}-10}{1000}\right) & 10m < d_{2D-out}
    \end{cases}
  notes: []
- scenario: UMi-StreetCanyon
  formula: Pr_{LOS} = \begin{cases} 1 & d_{2D-out} \le 18m \\ \dfrac{18}{d_{2D-out}} + \exp\left(-\dfrac{d_{2D-out}}{36}\right)\left(1-\dfrac{18}{d_{2D-out}}\right)
    & 18m < d_{2D-out} \end{cases}
  notes: []
- scenario: UMa
  formula: Pr_{LOS} = \begin{cases} 1 & d_{2D-out} \le 18m \\ \left[\dfrac{18}{d_{2D-out}} + \exp\left(-\dfrac{d_{2D-out}}{63}\right)\left(1-\dfrac{18}{d_{2D-out}}\right)\right]\left(1
    + C'(h_{UT})\dfrac{5}{4}\left(\dfrac{d_{2D-out}}{100}\right)^3 \exp\left(-\dfrac{d_{2D-out}}{150}\right)\right) & 18m
    < d_{2D-out} \end{cases}; \quad C'(h_{UT}) = \begin{cases} 0 & h_{UT} \le 13m \\ \left(\dfrac{h_{UT}-13}{10}\right)^{1.5}
    & 13m < h_{UT} \le 23m \end{cases}
  notes: []
- scenario: Indoor-MixedOffice
  formula: Pr_{LOS} = \begin{cases} 1 & d_{2D-in} \le 1.2m \\ \exp\left(-\dfrac{d_{2D-in}-1.2}{4.7}\right) & 1.2m < d_{2D-in}
    < 6.5m \\ \exp\left(-\dfrac{d_{2D-in}-6.5}{32.6}\right)\cdot 0.32 & 6.5m \le d_{2D-in} \end{cases}
  notes: []
- scenario: Indoor-OpenOffice
  formula: Pr_{LOS} = \begin{cases} 1 & d_{2D-in} \le 5m \\ \exp\left(-\dfrac{d_{2D-in}-5}{70.8}\right) & 5m < d_{2D-in} \le
    49m \\ \exp\left(-\dfrac{d_{2D-in}-49}{211.7}\right)\cdot 0.54 & 49m < d_{2D-in} \end{cases}
  notes: []
- scenario: InF-SL, InF-DL, InF-SH, InF-DH
  formula: Pr_{LOS,subsce}(d_{2D}) = \exp\left(-\dfrac{d_{2D}}{k_{subsce}}\right); \quad k_{subsce} = \begin{cases} -\dfrac{d_{clutter}}{\ln(1-r)}
    & \text{for InF-SL and InF-DL} \\ -\dfrac{d_{clutter}}{\ln(1-r)}\cdot\dfrac{h_{BS}-h_{UT}}{h_c-h_{UT}} & \text{for InF-SH
    and InF-DH} \end{cases}
  notes:
  - Parameters d_clutter, r, h_c defined in Table 7.2-4
- scenario: InF-HH
  formula: Pr_{LOS} = 1
  notes: []
- scenario: SMa
  formula: P_{LOS} = \begin{cases} 1 & d_{2D-out} \le 10m \\ \exp\left(-\dfrac{d_{2D-out}}{k_{commercial}}\right)\exp\left(-\dfrac{d_{2D-out}}{k_{residential}}\right)\exp\left(-\dfrac{d_{2D-out}}{k_{vegetation}}\right)
    & d_{2D-out} > 10m \end{cases}; \quad \dfrac{1}{k_{commercial}} = -\dfrac{\ln(1-r_{commercial})}{d_{clutter}}\cdot\dfrac{h_{commercial}-h_{UT}}{h_{BS}-h_{UT}};
    \quad \dfrac{1}{k_{residential}} = -\dfrac{\ln(1-r_{residential})}{d_{clutter}}\cdot\dfrac{\max(h_{residential}-h_{UT},0)}{h_{BS}-h_{UT}};
    \quad \dfrac{1}{k_{vegetation}} = -\dfrac{\ln(1-r_{vegetation})}{d_{clutter}}\cdot\dfrac{h_{vegetation}-h_{UT}}{h_{BS}-h_{UT}};
    \quad d_{clutter}=30m, h_{commercial}=20m, h_{residential}=8m, h_{vegetation}=15m, r_{commercial}=2\%, r_{residential}=18\%,
    r_{vegetation}=0\%/10\%/20\%
  notes:
  - 'r_vegetation: 0% no vegetation, 10% sparse vegetation, 20% dense vegetation'
o2i_penetration_loss:
  materials:
  - material: Standard multi-pane glass
    formula: L_{glass} = 2 + 0.2f
    notes:
    - NOTE 1
  - material: IRR glass
    formula: L_{IRRglass} = 25.4 + 0.11f
    notes:
    - NOTE 1
    - NOTE 2
  - material: Concrete
    formula: L_{concrete} = 5 + 4f
    notes:
    - NOTE 1
  - material: Plywood
    formula: L_{plywood} = 1.03 + 0.17f
    notes:
    - NOTE 1
  - material: Wood
    formula: L_{wood} = 4.85 + 0.12f
    notes:
    - NOTE 1
  building_models:
  - model: Low-loss model
    pl_tw_formula: 5 - 10\log_{10}\left(0.3\cdot10^{-L_{glass}/10} + 0.7\cdot10^{-L_{concrete}/10}\right)
    pl_in_formula: 0.5\, d_{2D-in}
    std_p_db: 4.4
  - model: High-loss model
    pl_tw_formula: 5 - 10\log_{10}\left(0.7\cdot10^{-L_{IRRglass}/10} + 0.3\cdot10^{-L_{concrete}/10}\right)
    pl_in_formula: 0.5\, d_{2D-in}
    std_p_db: 6.5
  - model: Low-loss A model
    pl_tw_formula: 5 - 10\log_{10}\left(0.3\cdot10^{-L_{glass}/10} + 0.7\cdot10^{-L_{plywood}/10}\right)
    pl_in_formula: 0.5\, d_{2D-in}
    std_p_db: 4.4
  building_single_frequency_below_6ghz:
    pl_tw_db: 20
    pl_in_formula: 0.5\, d_{2D-in} \text{, with } d_{2D-in} \text{ a single, link-specific, uniform variable between 0 and
      25 m}
    sigma_p_db: 0
    sigma_sf_db: 7
    note: sigma_SF replaces the respective value in Table 7.4.1-1
  car_penetration_loss:
    formula: PL = PL_b + N(\mu, \sigma_P^2)
    formula_ref: 7.4-4
    mu_db: 9
    mu_metallized_windows_db: 20
    sigma_p_db: 5
    applicable_range_ghz: 0.6-60
shadow_fading_autocorrelation:
  formula: R(\Delta x) = e^{-|\Delta x| / d_{cor}}
  formula_ref: 7.4-5
  note: Correlation length d_cor depends on the environment; see Table 7.5-6 (Channel model parameters). In the spatial consistency
    procedure (Clause 7.6.3), cluster-specific random variables are also correlated following this exponential function.
