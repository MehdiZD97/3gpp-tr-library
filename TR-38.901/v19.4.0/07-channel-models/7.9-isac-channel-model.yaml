  parameter: Outdoor/indoor
  value: Outdoor
  indoor_value: null
  outdoor_value: null
- scenario_type: UAV
  parameter: 3D mobility
  value: "Horizontal velocity: uniform distribution between 0 and 180km/h, if horizontal velocity is not fixed to 0. \n\nVertical velocity: 0km/h, optional {20, 40} km/h\nsee note 2 and 3"
  indoor_value: null
  outdoor_value: null
- scenario_type: UAV
  parameter: 3D distribution
  value: "Horizontal plane: \nOption A: N targets uniformly distributed within one cell. \nOption B: N targets uniformly distributed per cell. \nOption C: N targets uniformly distributed within an area not necessarily determined by cell boundaries.\nN = {1, 2, 3, 4, 5}\nsee note 4\n\nVertical plane: \nOption A: Uniform between 1.5m and 300m.\nOption B: Fixed height value chosen from {25, 50, 100, 200, 300} m assuming vertical velocity is equal to 0."
  indoor_value: null
  outdoor_value: null
- scenario_type: UAV
  parameter: Orientation
  value: Random in horizontal domain
  indoor_value: null
  outdoor_value: null
- scenario_type: UAV
  parameter: Physical characteristics (e.g., size)
  value: "Size:\nOption 1: 1.6m x 1.5m x 0.7m \nOption 2: 0.3m x 0.4m x 0.2m"
  indoor_value: null
  outdoor_value: null
- scenario_type: UAV
  parameter: Minimum 3D distances between STX/SRX and sensing target
  value: Min distances based on min TRP/UE distances defined in TR36.777.
  indoor_value: null
  outdoor_value: null
- scenario_type: UAV
  parameter: Minimum 3D distance between sensing targets
  value: 'Option 1: At least larger than the physical size of a target

    Option 2: 10 meters'
  indoor_value: null
  outdoor_value: null
