  value: "UMi, UMa, RMa, SMa \nUMi-AV, UMa-AV, RMa-AV [36.777]"
  indoor_value: null
  outdoor_value: null
- scenario_type: UAV
  parameter: STX/SRX Locations
  value: 'STX/SRX locations are selected among the TRPs and UEs locations in the corresponding communication scenarios.

