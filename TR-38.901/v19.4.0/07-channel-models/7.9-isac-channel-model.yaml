  reference_scenario: UMa-AV in Table B-1 in TR 36.777 for aerial UE height in range (22.5m, 100m] for sensing scenario UMi-AV/UMa-AV; RMa-AV in Table B-1 in TR 36.777 for aerial UE height in range (10m, 40m] for sensing scenario RMa-AV
