  reference_scenario: UMi-AV in Table B-1 in TR 36.777 for sensing scenario UMi-AV/UMa-AV; RMa-AV in Table B-1 in TR 36.777 for sensing scenario RMa-AV
  applicability_range: 'Sensing scenario UMi-AV, UMa-AV: 22.5m < hUT <= 300m; Sensing scenario RMa-AV: 10m < hUT <= 300m'
- case: '9'
  reference_scenario: UMi in Table 7.4.2-1 in TR 38.901 for sensing scenario UMi-AV/UMa-AV/RMa-AV
  applicability_range: 'Sensing scenario UMi-AV, UMa-AV: 1.5m <= hUT1, hUT2 <= 22.5m; Sensing scenario RMa-AV: 1.5m <= hUT1, hUT2 <= 10m'
