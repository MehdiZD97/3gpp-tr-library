reference_channel_models:
- case: '1'
  tx: TRP
  rx: TRP
  reference_tr: "For sensing scenario UMi/UMi-AV, UMa/UMa-AV, RMa/RMa-AV, InH, InF\n- TRP-TRP link of scenario UMi, UMa, InH, and InF following the option based on TR 38.901 defined in Clause A.3 of TR 38.858\n - For InF, hUT is changed to the same height as the BS\n- TRP-UE link of scenario RMa defined in Clause 7 of TR 38.901 by setting hUT=35m (see note 1)\nFor sensing scenario Highway \n- TRP-UE link of scenario RMa in Clause 7 of TR 38.901 by setting hUT=35m for FR1(see note 1)\n- TRP-TRP link of scenario UMa following the option based on TR 38.901 defined in Clause A.3 of TR 38.858 for FR2\nFor sensing scenario Urban grid\n- TRP-TRP link of scenario UMa following the option based on TR 38.901 defined in Clause A.3 of TR 38.858\nFor sensing scenario HST\n- TRP-UE link of scenario RMa in Clause 7 of TR 38.901 by setting hUT=35m for FR1 (see note 1)\n- TRP-TRP link of scenario UMa following the option based on TR 38.901 defined in Clause A.3 of TR 38.858 for FR2"
- case: '2'
  tx: TRP
  rx: terrestrial UE
  reference_tr: "For sensing scenario UMi/UMi-AV, UMa/UMa-AV, RMa/RMa-AV, InH, InF\n- TRP-UE link of scenario UMi, UMa, RMa, InH, and InF in Clause 7 of TR 38.901\nFor sensing scenario Highway and Urban grid\n- P2B link of scenario Highway and Urban grid in Clause 6 of TR 37.885 \nFor sensing scenario HST\n- TRP-UE link of scenario RMa in Clause 7 of TR 38.901 for FR1 and TRP-UE link of scenario UMa in Clause 7 of TR 38.901 for FR2"
- case: '3'
  tx: TRP
  rx: vehicle UE
  reference_tr: "For sensing scenario Highway and Urban grid \n- V2B link of scenario Highway and Urban grid in Clause 6 of TR 37.885\nFor sensing scenario UMi, UMa, and RMa\n- TRP-UE link of scenario UMi, UMa, and RMa in Clause 7 of TR 38.901"
- case: '4'
  tx: TRP
  rx: aerial UE
  reference_tr: "For sensing scenario UMa-AV, UMi-AV, and RMa-AV \n- TRP-aerial UE link of scenario UMa-AV, UMi-AV, and RMa-AV in Clause Annex A and B of TR 36.777 for FR1\n- Reuse the channel model of scenario UMa-AV, UMi-AV, and RMa-AV of FR1 for FR2"
- case: '5'
  tx: terrestrial UE
  rx: terrestrial UE
  reference_tr: 'For sensing scenario UMi/UMi-AV, UMa/UMa-AV, RMa/RMa-AV, InH, InF

    - UE-UE link of scenario UMi, UMa, InH, and InF following the option based on TR 38.901 defined in Clause A.3 of TR 38.858

    - TRP-UE link of scenario RMa defined in Clause 7 of TR 38.901 by setting hBS=1.5m (see note 2)

    For sensing scenario Highway and Urban grid

    - P2P link in Clause 6 of TR 37.885

    For sensing scenario HST

    - TRP-UE link of scenario RMa in Clause 7 of TR 38.901 by setting hBS=1.5m for FR1

    - UE-UE link of scenario UMa following the option based on TR 38.901 defined in Clause A.3 of TR 38.858 for FR2'
- case: '6'
  tx: terrestrial UE
  rx: vehicle UE
  reference_tr: 'For sensing scenario UMi, UMa, RMa

    - UE-UE link of scenario UMi, UMa following the option based on TR 38.901 defined in Clause A.3 of TR 38.858

    - TRP-UE link of scenario RMa defined in Clause 7 of TR 38.901 by setting hBS=1.5m

    For sensing scenario Highway and Urban grid

    - V2P link in Clause 6 of TR 37.885'
- case: '7'
  tx: terrestrial UE
  rx: aerial UE
  reference_tr: 'For sensing scenario UMi-AV, UMa-AV, and RMa-AV

    - TRP-aerial UE link of UMi-AV in Annex A and B of TR 36.777 by setting hBS=1.5m for FR1

    - Reuse the channel model of scenario UMa-AV, UMi-AV, and RMa-AV of FR1 for FR2

    - The corresponding parameter values in FR2 are used'
- case: '8'
  tx: vehicle UE
  rx: vehicle UE
  reference_tr: "For sensing scenario Highway and Urban grid \n- V2V link of scenario Highway and Urban grid in Clause 6 of TR 37.885 \nFor sensing scenario UMi, UMa, and RMa\n- UE-UE link of scenario UMi, UMa following the option based on TR 38.901 defined in Clause A.3 of TR 38.858\n- TRP-UE link of scenario RMa defined in Clause 7 of TR 38.901 by setting hBS=1.5m"
- case: '9'
  tx: aerial UE
  rx: aerial UE
  reference_tr: 'For sensing scenario UMi-AV, UMa-AV, RMa-AV

    - TRP-aerial UE link of UMi-AV in Annex A and B of TR 36.777 by setting height of TRP equal to the height of the first aerial UE for FR1 (see note 4)

    - Reuse the channel model of scenario UMa-AV, UMi-AV, and RMa-AV of FR1 for FR2

    - The corresponding parameter values in FR2 are used'
- case: '10'
  tx: TRP
  rx: RSU-type UE
  reference_tr: 'Highway and Urban grid

    - B2R link in Clause 6 of TR 37.885'
- case: '11'
  tx: RSU-type UE
  rx: terrestrial UE
  reference_tr: 'Highway and Urban grid

    - V2V link in Clause 6 of TR 37.885, with antenna height at RSU is 5m'
- case: '12'
  tx: RSU-type UE
  rx: RSU-type UE
  reference_tr: 'Highway and Urban grid

    - V2V link in Clause 6 of TR 37.885, with antenna height at RSU is 5m'
- case: '13'
  tx: RSU-type UE
  rx: vehicle UE
  reference_tr: 'Highway and Urban grid

    - V2V link in Clause 6 of TR 37.885, with antenna height at RSU is 5m'
