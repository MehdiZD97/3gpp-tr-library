- table: 7.9.6.3-1
  parameter: Calibration link and calibration method
  value: "- Calibration link: same target associated to different UT as following figure\n\n- Calibration method\nStep1: In single drop simulation, drop one Target and multiple UTs.\nStep2: Generate the channel of each link based on Target level spatial consistency method.\nStep3: Determine Target-UT groups based on the distance between UTs.\nStep4: Bin all the link pairs into certain distance groups, e.g.,\n - 0m <= the location distance of link pair < 1m -> 0m group\n - 1m <= the location distance of link pair < 2m -> 1m group\n - 2m <= the location distance of link pair < 3m -> 2m group\n - 3m <= the location distance of link pair < 4m -> 3m group\n …\n - (N)m <= the location distance of pair < (N+1)m -> (N)m group (see note 2)\nStep5: Calculate the correlation coefficient metric of each distance groups.\nStep6: Draw the x-y cure, where x=0, …, N, y= correlation coefficient metric related to (x)m group"
  indoor_value: null
  outdoor_value: null
- table: 7.9.6.3-1
  parameter: ST and UT distribution
  value: "- Urban grid\none target is uniformly dropped within the center grid in the outside lane with length of 433m, \nthe UT is distributed by a uniform distribution distance of [0,1]m in the walk road where is in the same street with the target. \nAs following figure.\n\nsee note 3\n \n- Indoor office\n1 Target is uniform dropped in office region\n10 UTs are dropped uniformly per cell, i.e., totally 120 UTs are uniformly dropped in office region."
  indoor_value: null
  outdoor_value: null
