  reference_scenario: UMi-AV in Table B-1 in TR 36.777 for sensing scenario UMi-AV/UMa-AV; RMa-AV in Table B-1 in TR 36.777 for sensing scenario RMa-AV
  applicability_range: 'Sensing scenario UMi-AV, UMa-AV: 22.5m < max(hUT1, hUT2) <= 300m, 1.5m <= min(hUT1, hUT2) <= 22.5m; Sensing scenario RMa-AV: 10m < max(hUT1, hUT2) <= 300m, 1.5m <= min(hUT1, hUT2) <= 10m'
