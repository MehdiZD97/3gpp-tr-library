los_probability:
- scenario: RMa-AV
  height_range: 1.5m <= hUT <= 10m
  los_probability: According to Table 7.4.2-1 of [4] using the $Pr_{LOS}$ formula of RMa
  notes: []
- scenario: RMa-AV
  height_range: 10m < hUT <= 40m
  los_probability: Pr_{LOS} = \begin{cases} 1 & d_{2D} \le d_1 \\ \dfrac{d_1}{d_{2D}} + \exp\left(\dfrac{-d_{2D}}{p_1}\right)\left(1 - \dfrac{d_1}{d_{2D}}\right) & d_{2D} > d_1 \end{cases}; \quad p_1 =
    \max(15021\log_{10}(h_{UT}) - 16053, 1000); \quad d_1 = \max(1350.8\log_{10}(h_{UT}) - 1602, 18)
  notes:
  - Note 1
  - Note 2
- scenario: RMa-AV
  height_range: 40m < hUT <= 300m
  los_probability: 100%
  notes: []
- scenario: UMa-AV
  height_range: 1.5m <= hUT <= 22.5m
  los_probability: According to Table 7.4.2-1 of [4] using the $Pr_{LOS}$ formula of UMa
  notes: []
- scenario: UMa-AV
  height_range: 22.5m < hUT <= 100m
  los_probability: Pr_{LOS} = \begin{cases} 1 & d_{2D} \le d_1 \\ \dfrac{d_1}{d_{2D}} + \exp\left(\dfrac{-d_{2D}}{p_1}\right)\left(1 - \dfrac{d_1}{d_{2D}}\right) & d_{2D} > d_1 \end{cases}; \quad p_1 =
    4300\log_{10}(h_{UT}) - 3800; \quad d_1 = \max(460\log_{10}(h_{UT}) - 700, 18)
  notes:
  - Note 1
  - Note 2
- scenario: UMa-AV
  height_range: 100m < hUT <= 300m
  los_probability: 100%
  notes: []
- scenario: UMi-AV
  height_range: 1.5m <= hUT <= 22.5m
  los_probability: According to Table 7.4.2-1 of [4] using the $Pr_{LOS}$ formula of UMi
  notes: []
- scenario: UMi-AV
  height_range: 22.5m < hUT <= 300m
  los_probability: Pr_{LOS} = \begin{cases} 1 & d_{2D} \le d_1 \\ \dfrac{d_1}{d_{2D}} + \exp\left(\dfrac{-d_{2D}}{p_1}\right)\left(1 - \dfrac{d_1}{d_{2D}}\right) & d_{2D} > d_1 \end{cases}; \quad p_1 =
    233.98\log_{10}(h_{UT}) - 0.95; \quad d_1 = \max(294.05\log_{10}(h_{UT}) - 432.94, 18)
  notes:
  - Note 1
  - Note 2
los_probability_notes:
  Note 1: The LOS probability is derived assuming antenna heights of 35m for RMa-AV, 25m for UMa-AV, and 10m for UMi-AV.
  Note 2: d_1 is given in units of meters.
pathloss:
- scenario: RMa-AV
  condition: LOS
  height_range: 1.5m <= hUT <= 10m
  pathloss: According to Table 7.4.1-1 of [4] using the $PL_{RMa-LOS}$ formula
  notes: []
- scenario: RMa-AV
  condition: LOS
  height_range: 10m < hUT <= 300m, d2D <= 10km
  pathloss: PL_{RMa-AV-LOS} = \max(23.9 - 1.8\log_{10}(h_{UT}), 20)\log_{10}(d_{3D}) + 20\log_{10}\left(\dfrac{40\pi f_c}{3}\right)
  notes: []
- scenario: RMa-AV
  condition: NLOS
  height_range: 1.5m <= hUT <= 10m
  pathloss: According to Table 7.4.1-1 of [4] using the $PL_{RMa-NLOS}$ formula
  notes: []
- scenario: RMa-AV
  condition: NLOS
  height_range: 10m < hUT <= 300m, d2D <= 10km
  pathloss: PL_{RMa-AV-NLOS} = \max\left(PL_{RMa-AV-LOS},\; -12 + (35 - 5.3\log_{10}(h_{UT}))\log_{10}(d_{3D}) + 20\log_{10}\left(\dfrac{40\pi f_c}{3}\right)\right)
  notes:
  - Note 2
- scenario: UMa-AV
  condition: LOS
  height_range: 1.5m <= hUT <= 22.5m
  pathloss: According to Table 7.4.1-1 of [4] using the $PL_{UMa-LOS}$ formula
  notes: []
- scenario: UMa-AV
  condition: LOS
  height_range: 22.5m < hUT <= 300m, d2D <= 4km
  pathloss: PL_{UMa-AV-LOS} = 28.0 + 22\log_{10}(d_{3D}) + 20\log_{10}(f_c)
  notes:
  - Note 1
- scenario: UMa-AV
  condition: NLOS
  height_range: 1.5m <= hUT <= 22.5m
  pathloss: According to Table 7.4.1-1 of [4] using the $PL_{UMa-NLOS}$ formula
  notes: []
- scenario: UMa-AV
  condition: NLOS
  height_range: 10m < hUT <= 100m, d2D <= 4km
  pathloss: PL_{UMa-AV-NLOS} = -17.5 + (46 - 7\log_{10}(h_{UT}))\log_{10}(d_{3D}) + 20\log_{10}\left(\dfrac{40\pi f_c}{3}\right)
  notes: []
- scenario: UMi-AV
  condition: LOS
  height_range: 1.5m <= hUT <= 22.5m
  pathloss: According to Table 7.4.1-1 of [4] using the $PL_{UMi-LOS}$ formula
  notes: []
- scenario: UMi-AV
  condition: LOS
  height_range: 22.5m < hUT <= 300m, d2D <= 4km
  pathloss: PL_{UMi-AV-LOS} = \max\{PL',\; 30.9 + (22.25 - 0.5\log_{10}(h_{UT}))\log_{10}(d_{3D}) + 20\log_{10}(f_c)\}
  notes:
  - Note 3
- scenario: UMi-AV
  condition: NLOS
  height_range: 1.5m <= hUT <= 22.5m
  pathloss: According to Table 7.4.1-1 of [4] using the $PL_{UMi-NLOS}$ formula
  notes: []
- scenario: UMi-AV
  condition: NLOS
  height_range: 22.5m < hUT <= 300m, d2D <= 4km
  pathloss: PL_{UMi-AV-NLOS} = \max\{PL_{UMi-AV-LOS},\; 32.4 + (43.2 - 7.6\log_{10}(h_{UT}))\log_{10}(d_{3D}) + 20\log_{10}(f_c)\}
  notes:
  - Note 4
pathloss_notes:
  Note 1: For UMa-AV LOS, breakpoint distance is not observed for the aerial UE height range 22.5m <= hUT <= 300m and 2D distance range d2D <= 4km.
  Note 2: In this expression, PL_{RMa-AV-LOS} is the RMa-AV LOS pathloss of aerial UEs with height range 10m <= hUT <= 300m and 2D distance range d2D <= 10km.
  Note 3: In this expression, PL' represents the free space path loss.
  Note 4: In this expression, PL_{UMi-AV-LOS} is the UMi-AV LOS pathloss of aerial UEs with height range 22.5m < hUT <= 300m and 2D distance range d2D <= 4km.
